<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TREASURE — Movie Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dark: #7a5c1e;
    --bg: #0a0806;
    --bg2: #13100a;
    --bg3: #1e1810;
    --text: #e8dcc8;
    --muted: #7a6a50;
    --danger: #c0392b;
    --success: #2ecc71;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 50%, #c9a84c08 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, #c9a84c05 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }
  header {
    position: relative;
    padding: 48px 60px 32px;
    border-bottom: 1px solid #c9a84c22;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
  }
  .logo { display: flex; flex-direction: column; gap: 2px; }
  .logo-main {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: 8px;
    background: linear-gradient(135deg, #7a5c1e, #f0d080, #c9a84c, #7a5c1e);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s infinite;
    line-height: 1;
  }
  @keyframes shimmer {
    0%,100%{background-position:0% 50%} 50%{background-position:100% 50%}
  }
  .logo-sub { font-size: 0.65rem; letter-spacing: 6px; color: var(--muted); text-transform: uppercase; }
  .header-stats { display: flex; gap: 32px; text-align: right; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); font-weight: 700; }
  .stat-label { font-size: 0.6rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
  .tabs {
    display: flex; padding: 0 60px;
    border-bottom: 1px solid #c9a84c15;
    position: relative; z-index: 10;
  }
  .tab {
    padding: 20px 32px; font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase;
    color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.3s; background: none; border-top: none; border-left: none; border-right: none;
    font-family: 'DM Mono', monospace;
  }
  .tab:hover { color: var(--gold-light); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .content { padding: 48px 60px; position: relative; z-index: 10; }
  .view { display: none; }
  .view.active { display: block; }
  .upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
  .upload-zone {
    border: 2px dashed var(--gold-dark); border-radius: 4px; padding: 60px 40px;
    text-align: center; cursor: pointer; transition: all 0.3s;
    background: #c9a84c05; position: relative; overflow: hidden;
  }
  .upload-zone::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at center, #c9a84c08, transparent 70%);
    opacity: 0; transition: opacity 0.3s;
  }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--gold); background: #c9a84c0a; }
  .upload-zone:hover::before, .upload-zone.drag-over::before { opacity: 1; }
  .upload-icon { font-size: 3rem; display: block; margin-bottom: 20px; filter: drop-shadow(0 0 20px #c9a84c44); }
  .upload-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold-light); margin-bottom: 8px; }
  .upload-sub { font-size: 0.7rem; color: var(--muted); letter-spacing: 2px; line-height: 1.8; }
  #fileInput { display: none; }
  .upload-btn {
    display: inline-block; margin-top: 24px; padding: 12px 32px;
    background: transparent; border: 1px solid var(--gold); color: var(--gold);
    font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 4px;
    text-transform: uppercase; cursor: pointer; transition: all 0.3s; border-radius: 2px;
  }
  .upload-btn:hover { background: var(--gold); color: var(--bg); box-shadow: 0 0 30px #c9a84c44; }
  .upload-form { display: flex; flex-direction: column; gap: 20px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-label { font-size: 0.65rem; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; }
  .form-input, .form-select, .form-textarea {
    background: var(--bg2); border: 1px solid #c9a84c22; color: var(--text);
    padding: 12px 16px; font-family: 'DM Mono', monospace; font-size: 0.85rem;
    border-radius: 2px; transition: border-color 0.3s; outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold); }
  .form-select option { background: var(--bg2); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .submit-btn {
    padding: 14px; background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none; color: var(--bg); font-family: 'Playfair Display', serif;
    font-size: 1rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; border-radius: 2px; transition: all 0.3s;
  }
  .submit-btn:hover { box-shadow: 0 8px 30px #c9a84c44; transform: translateY(-1px); }
  .progress-wrap { display: none; background: var(--bg3); border-radius: 2px; overflow: hidden; height: 6px; }
  .progress-bar {
    height: 100%; background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
    width: 0%; transition: width 0.3s; box-shadow: 0 0 10px var(--gold);
  }
  .progress-label { font-size: 0.65rem; color: var(--muted); text-align: center; letter-spacing: 2px; }
  .vault-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .vault-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold-light); }
  .search-bar { display: flex; gap: 12px; align-items: center; }
  .search-input {
    background: var(--bg2); border: 1px solid #c9a84c22; color: var(--text);
    padding: 10px 16px; font-family: 'DM Mono', monospace; font-size: 0.8rem;
    border-radius: 2px; outline: none; width: 240px; transition: border-color 0.3s;
  }
  .search-input:focus { border-color: var(--gold); }
  .filter-select {
    background: var(--bg2); border: 1px solid #c9a84c22; color: var(--text);
    padding: 10px 16px; font-family: 'DM Mono', monospace; font-size: 0.75rem;
    border-radius: 2px; outline: none; cursor: pointer;
  }
  .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }
  .movie-card {
    background: var(--bg2); border: 1px solid #c9a84c15; border-radius: 4px;
    overflow: hidden; transition: all 0.3s; cursor: pointer; animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .movie-card:hover { border-color: var(--gold-dark); transform: translateY(-4px); box-shadow: 0 12px 40px #00000088, 0 0 0 1px #c9a84c22; }
  .movie-thumb {
    width: 100%; aspect-ratio: 16/9; background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; position: relative; overflow: hidden;
  }
  .movie-thumb::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, var(--bg2)); }
  .movie-badge {
    position: absolute; top: 8px; right: 8px; background: var(--gold); color: var(--bg);
    font-size: 0.55rem; letter-spacing: 2px; padding: 3px 8px; text-transform: uppercase;
    font-weight: 700; border-radius: 2px; z-index: 1;
  }
  .movie-info { padding: 16px; }
  .movie-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--gold-light); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .movie-meta { font-size: 0.65rem; color: var(--muted); letter-spacing: 2px; margin-bottom: 12px; }
  .movie-desc { font-size: 0.72rem; color: #9a8a70; line-height: 1.7; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .movie-actions { display: flex; gap: 8px; }
  .btn-dl {
    flex: 1; padding: 9px; background: transparent; border: 1px solid var(--gold-dark);
    color: var(--gold); font-family: 'DM Mono', monospace; font-size: 0.65rem;
    letter-spacing: 3px; text-transform: uppercase; cursor: pointer; border-radius: 2px;
    transition: all 0.3s; text-align: center;
  }
  .btn-dl:hover { background: var(--gold); color: var(--bg); border-color: var(--gold); box-shadow: 0 0 20px #c9a84c33; }
  .btn-del {
    padding: 9px 12px; background: transparent; border: 1px solid #c0392b33; color: #c0392b;
    font-family: 'DM Mono', monospace; font-size: 0.75rem; cursor: pointer; border-radius: 2px; transition: all 0.3s;
  }
  .btn-del:hover { background: #c0392b22; }
  .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 40px; color: var(--muted); }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; display: block; opacity: 0.4; }
  .empty-text { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 8px; color: var(--gold-dark); }
  .empty-sub { font-size: 0.7rem; letter-spacing: 2px; }
  .toast {
    position: fixed; bottom: 32px; right: 32px; background: var(--bg3);
    border: 1px solid var(--gold-dark); color: var(--text); padding: 16px 24px;
    border-radius: 4px; font-size: 0.8rem; letter-spacing: 1px;
    transform: translateY(100px); opacity: 0;
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 1000; box-shadow: 0 8px 30px #00000066; max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }
  .file-selected {
    background: var(--bg3); border: 1px solid var(--gold-dark); padding: 16px;
    border-radius: 4px; display: none; gap: 12px; align-items: center;
  }
  .file-selected.show { display: flex; }
  .file-icon { font-size: 1.5rem; }
  .file-details { flex: 1; }
  .file-name { font-size: 0.8rem; color: var(--gold-light); margin-bottom: 2px; }
  .file-size { font-size: 0.65rem; color: var(--muted); letter-spacing: 2px; }
  .corner-decor { position: fixed; width: 60px; height: 60px; pointer-events: none; z-index: 5; }
  .corner-decor.tl { top: 20px; left: 20px; border-top: 1px solid #c9a84c33; border-left: 1px solid #c9a84c33; }
  .corner-decor.tr { top: 20px; right: 20px; border-top: 1px solid #c9a84c33; border-right: 1px solid #c9a84c33; }
  .corner-decor.bl { bottom: 20px; left: 20px; border-bottom: 1px solid #c9a84c33; border-left: 1px solid #c9a84c33; }
  .corner-decor.br { bottom: 20px; right: 20px; border-bottom: 1px solid #c9a84c33; border-right: 1px solid #c9a84c33; }
  @media(max-width:768px){
    header{padding:24px;flex-direction:column;gap:16px;text-align:center}
    .tabs{padding:0 24px} .content{padding:24px}
    .upload-section{grid-template-columns:1fr} .logo-main{font-size:2rem}
    .header-stats{justify-content:center}
    .vault-header{flex-direction:column;gap:16px;align-items:flex-start}
    .search-bar{flex-wrap:wrap} .search-input{width:100%}
  }
</style>
</head>
<body>

<div class="corner-decor tl"></div>
<div class="corner-decor tr"></div>
<div class="corner-decor bl"></div>
<div class="corner-decor br"></div>

<header>
  <div class="logo">
    <div class="logo-main">TREASURE</div>
    <div class="logo-sub">The Movie Vault</div>
  </div>
  <div class="header-stats">
    <div class="stat"><div class="stat-val" id="totalMovies">0</div><div class="stat-label">Films</div></div>
    <div class="stat"><div class="stat-val" id="totalSize">0 MB</div><div class="stat-label">Vault Size</div></div>
    <div class="stat"><div class="stat-val" id="totalDownloads">0</div><div class="stat-label">Downloads</div></div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" id="tab-vault" onclick="switchTab('vault', this)">⬡ Vault</button>
  <button class="tab" id="tab-upload" onclick="switchTab('upload', this)">⬆ Upload</button>
</div>

<div class="content">

  <div class="view active" id="vault-view">
    <div class="vault-header">
      <div class="vault-title">Movie Vault</div>
      <div class="search-bar">
        <input class="search-input" type="text" placeholder="Search films..." id="searchInput" oninput="renderMovies()">
        <select class="filter-select" id="genreFilter" onchange="renderMovies()">
          <option value="">All Genres</option>
          <option>Action</option><option>Drama</option><option>Comedy</option>
          <option>Horror</option><option>Sci-Fi</option><option>Thriller</option>
          <option>Romance</option><option>Documentary</option><option>Animation</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="movie-grid" id="movieGrid"></div>
  </div>

  <div class="view" id="upload-view">
    <div class="upload-section">
      <div>
        <div class="upload-zone" id="dropZone"
          onclick="document.getElementById('fileInput').click()"
          ondragover="handleDragOver(event)"
          ondrop="handleDrop(event)"
          ondragleave="handleDragLeave(event)">
          <span class="upload-icon">🎬</span>
          <div class="upload-title">Drop Your Film Here</div>
          <div class="upload-sub">MP4 · MKV · AVI · MOV · WebM<br>Any file size supported</div>
          <button class="upload-btn" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">Choose File</button>
        </div>
        <input type="file" id="fileInput" accept="video/*" onchange="handleFileSelect(event)">
        <div style="height:16px"></div>
        <div class="file-selected" id="fileSelected">
          <span class="file-icon">🎞️</span>
          <div class="file-details">
            <div class="file-name" id="selectedFileName">—</div>
            <div class="file-size" id="selectedFileSize">—</div>
          </div>
          <span style="color:var(--success)">✓</span>
        </div>
        <div style="height:16px"></div>
        <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
        <div class="progress-label" id="progressLabel" style="margin-top:8px;display:none"></div>
      </div>

      <div class="upload-form">
        <div class="form-group">
          <label class="form-label">Film Title *</label>
          <input class="form-input" type="text" id="movieTitle" placeholder="Enter the movie title">
        </div>
        <div class="form-group">
          <label class="form-label">Genre</label>
          <select class="form-select" id="movieGenre">
            <option value="">Select genre</option>
            <option>Action</option><option>Drama</option><option>Comedy</option>
            <option>Horror</option><option>Sci-Fi</option><option>Thriller</option>
            <option>Romance</option><option>Documentary</option><option>Animation</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Year</label>
          <input class="form-input" type="number" id="movieYear" placeholder="e.g. 2024" min="1888" max="2099">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="movieDesc" placeholder="Brief description of the film..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Uploader Name</label>
          <input class="form-input" type="text" id="uploaderName" placeholder="Your name or alias">
        </div>
        <button class="submit-btn" onclick="uploadMovie()">⬆ Add to Vault</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let movies = [];
  let selectedFile = null;
  let totalDownloads = parseInt(localStorage.getItem('treasure_downloads') || '0');

  // Load saved metadata
  try {
    const saved = JSON.parse(localStorage.getItem('treasure_movies') || '[]');
    movies = saved; // blob URLs will be gone after reload, but metadata stays
  } catch(e) {}

  function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(tab + '-view').classList.add('active');
    if (tab === 'vault') renderMovies();
  }

  function handleDragOver(e) {
    e.preventDefault();
    document.getElementById('dropZone').classList.add('drag-over');
  }
  function handleDragLeave(e) {
    document.getElementById('dropZone').classList.remove('drag-over');
  }
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('dropZone').classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('video/')) { setFile(file); }
    else { showToast('Please drop a valid video file.', 'error'); }
  }
  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file) setFile(file);
  }
  function setFile(file) {
    selectedFile = file;
    document.getElementById('selectedFileName').textContent = file.name;
    document.getElementById('selectedFileSize').textContent = formatSize(file.size);
    document.getElementById('fileSelected').classList.add('show');
    if (!document.getElementById('movieTitle').value) {
      document.getElementById('movieTitle').value = file.name.replace(/\.[^.]+$/, '').replace(/[._-]/g, ' ');
    }
  }

  function uploadMovie() {
    const title = document.getElementById('movieTitle').value.trim();
    if (!selectedFile) { showToast('Please select a video file first.', 'error'); return; }
    if (!title) { showToast('Please enter a film title.', 'error'); return; }

    const genre = document.getElementById('movieGenre').value;
    const year = document.getElementById('movieYear').value;
    const desc = document.getElementById('movieDesc').value.trim();
    const uploader = document.getElementById('uploaderName').value.trim() || 'Anonymous';

    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const progressLabel = document.getElementById('progressLabel');
    progressWrap.style.display = 'block';
    progressLabel.style.display = 'block';

    let progress = 0;
    const interval = setInterval(() => {
      progress += Math.random() * 15 + 5;
      if (progress >= 100) {
        progress = 100;
        clearInterval(interval);
        progressLabel.textContent = 'Processing...';
        setTimeout(() => {
          const url = URL.createObjectURL(selectedFile);
          const movie = {
            id: Date.now().toString(),
            title, genre, year, desc, uploader,
            size: selectedFile.size,
            filename: selectedFile.name,
            type: selectedFile.type,
            uploadedAt: new Date().toLocaleDateString(),
            url,
            downloads: 0,
            emoji: genreEmoji(genre)
          };
          movies.unshift(movie);
          saveMetadata();
          progressWrap.style.display = 'none';
          progressLabel.style.display = 'none';
          progressBar.style.width = '0%';
          resetUploadForm();
          showToast('"' + title + '" added to the vault! 🎬', 'success');
          updateStats();
          switchTab('vault', document.getElementById('tab-vault'));
        }, 600);
      }
      progressBar.style.width = progress + '%';
      progressLabel.textContent = 'Uploading... ' + Math.floor(progress) + '%';
    }, 80);
  }

  function resetUploadForm() {
    selectedFile = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('fileSelected').classList.remove('show');
    document.getElementById('movieTitle').value = '';
    document.getElementById('movieGenre').value = '';
    document.getElementById('movieYear').value = '';
    document.getElementById('movieDesc').value = '';
    document.getElementById('uploaderName').value = '';
  }

  function renderMovies() {
    const grid = document.getElementById('movieGrid');
    const search = document.getElementById('searchInput').value.toLowerCase();
    const genre = document.getElementById('genreFilter').value;

    let filtered = movies.filter(m => {
      const matchSearch = m.title.toLowerCase().includes(search) || (m.desc && m.desc.toLowerCase().includes(search));
      const matchGenre = !genre || m.genre === genre;
      return matchSearch && matchGenre;
    });

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty-state"><span class="empty-icon">🎭</span><div class="empty-text">' +
        (movies.length === 0 ? 'The Vault is Empty' : 'No Films Found') + '</div><div class="empty-sub">' +
        (movies.length === 0 ? 'Switch to Upload tab to add your first film' : 'Try a different search') + '</div></div>';
      return;
    }

    grid.innerHTML = filtered.map(m => `
      <div class="movie-card">
        <div class="movie-thumb">
          <span class="movie-badge">${m.genre || 'FILM'}</span>
          <span style="z-index:1;position:relative">${m.emoji || '🎬'}</span>
        </div>
        <div class="movie-info">
          <div class="movie-title">${m.title}</div>
          <div class="movie-meta">${[m.year, formatSize(m.size)].filter(Boolean).join(' · ')}</div>
          <div class="movie-desc">${m.desc || 'No description provided.'}</div>
          <div style="font-size:0.6rem;color:var(--muted);margin-bottom:12px;letter-spacing:1px">
            ⬆ ${m.uploader || 'Anonymous'} · ${m.uploadedAt} · ${m.downloads || 0} downloads
          </div>
          <div class="movie-actions">
            <button class="btn-dl" onclick="downloadMovie('${m.id}')">⬇ Download</button>
            <button class="btn-del" onclick="deleteMovie('${m.id}')" title="Remove">✕</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function downloadMovie(id) {
    const movie = movies.find(m => m.id === id);
    if (!movie) return;
    if (!movie.url) { showToast('File unavailable — was the page reloaded? Re-upload to download again.', 'error'); return; }
    const a = document.createElement('a');
    a.href = movie.url;
    a.download = movie.filename || movie.title + '.mp4';
    a.click();
    movie.downloads = (movie.downloads || 0) + 1;
    totalDownloads++;
    localStorage.setItem('treasure_downloads', totalDownloads);
    saveMetadata();
    updateStats();
    showToast('Downloading "' + movie.title + '"...', 'success');
    renderMovies();
  }

  function deleteMovie(id) {
    const movie = movies.find(m => m.id === id);
    if (!movie) return;
    if (!confirm('Remove "' + movie.title + '" from the vault?')) return;
    if (movie.url) URL.revokeObjectURL(movie.url);
    movies = movies.filter(m => m.id !== id);
    saveMetadata();
    updateStats();
    renderMovies();
    showToast('Film removed from vault.', 'success');
  }

  function saveMetadata() {
    const meta = movies.map(({url, ...rest}) => rest);
    try { localStorage.setItem('treasure_movies', JSON.stringify(meta)); } catch(e) {}
  }

  function updateStats() {
    const totalSize = movies.reduce((a, m) => a + (m.size || 0), 0);
    document.getElementById('totalMovies').textContent = movies.length;
    document.getElementById('totalSize').textContent = formatSize(totalSize);
    document.getElementById('totalDownloads').textContent = totalDownloads;
  }

  function formatSize(bytes) {
    if (!bytes) return '—';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    if (bytes < 1024*1024*1024) return (bytes/(1024*1024)).toFixed(1) + ' MB';
    return (bytes/(1024*1024*1024)).toFixed(2) + ' GB';
  }

  function genreEmoji(genre) {
    const map = {Action:'💥',Drama:'🎭',Comedy:'😂',Horror:'👻','Sci-Fi':'🚀',Thriller:'🔪',Romance:'❤️',Documentary:'📽️',Animation:'✨',Other:'🎬'};
    return map[genre] || '🎬';
  }

  function showToast(msg, type) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast show ' + (type || '');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.classList.remove('show'), 3500);
  }

  updateStats();
  renderMovies();
</script>
</body>
</html>
